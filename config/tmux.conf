# Zeus Terminal tmux configuration
# Optimized for web terminal usage

# Enable 256 colors and true color support
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse support
set -g mouse on

# Increase history limit (large for long Claude conversations)
set -g history-limit 50000

# Reduce escape time for faster response
set -sg escape-time 10

# Disable status bar (managed by web UI)
set -g status off

# Set base index to 1 (more intuitive)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows
set -g renumber-windows on

# Focus events for terminals that support them
set -g focus-events on

# Aggressive resize (resize immediately when possible)
setw -g aggressive-resize on

# Activity monitoring (disabled for web use)
setw -g monitor-activity off
set -g visual-activity off

# Bell handling
set -g visual-bell off
set -g bell-action none

# Allow clipboard access
set -g set-clipboard on

# Set default shell
set -g default-shell /bin/bash
